services:
  golearn:
    image: golearn
    build:
      context: .
      dockerfile: ./build/Dockerfile
    ports:
      - 8080:8080

  golive:
    image: "cosmtrek/air:latest"
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - 8080:8080
    environment:
      - GO111MODULE=on
    command: ["air"]

