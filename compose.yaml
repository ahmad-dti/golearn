services:
  golearn:
    image: golearn
    build:
      context: .
      dockerfile: ./build/Dockerfile
    container_name: golearn
    ports:
      - ${APP_PORT}:8080
    depends_on:
      - golearn-db
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - golearn-network

  golearn-db:
    image: postgres:15-alpine
    container_name: golearn-db
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - ${DB_PORT}:5432
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - golearn-network

  golearn-redis:
    image: redis:7-alpine
    container_name: golearn-redis
    ports:
      - ${REDIS_PORT}:6379
    volumes:
      - ./cache:/data
    restart: unless-stopped
    networks:
      - golearn-network

networks:
  golearn-network:
    name: golearn-network
    driver: bridge


